<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Password Generator</title>
<link rel="stylesheet" href="index.css" />
</head>
<body>

<div class="container">
    <h1>Generate a <span class="highlight">random password</span></h1>
    <p>Never use an insecure password again.</p>

    <div class="options">
        <label>
            Length:
            <input type="number" id="length" value="8" min="8" max="15">
        </label>

        <div class="horizontal-row">
            <label>
                Include Numbers
                <input type="checkbox" id="numbers" checked>
            </label>
            <label>
                Include Symbols
                <input type="checkbox" id="symbols" checked>
            </label>
            <label>
            Include Uppercase
            <input type="checkbox" id="uppercase" checked>
        </label>
        </div>
    </div>

    <button id="generateBtn">Generate passwords</button>

    <div class="divider"></div>

    <div class="passwords">
        <div id="password1" class="password-box"></div>
        <div id="password2" class="password-box"></div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
